<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vaultpaw</title>
<style>
  body { margin:0; background:#0D1A16; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px; }
  h1 { font-size:2.2rem; margin-bottom:8px; color:#3F8F6F; }
  p.tagline { opacity:0.75; font-size:1.1rem; max-width:420px; }
  .badge { margin-top:28px; padding:10px 22px; border:1px solid #3F8F6F; border-radius:999px; color:#3F8F6F; font-size:0.9rem; }
  a { color:#3F8F6F; }
  footer { margin-top:48px; font-size:0.8rem; opacity:0.5; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #3F8F6F55 0%, #3F8F6F00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Vaultpaw</h1>
  <p class="tagline">Document Vault &mdash; </p>
  <div class="badge">Coming to the App Store</div>
  <footer>
    <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
    Contact: s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
