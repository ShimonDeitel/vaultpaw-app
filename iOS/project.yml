name: Vaultpaw
options:
  bundleIdPrefix: com.shimondeitel.petdocs
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vaultpaw:
    type: application
    platform: iOS
    sources:
      - path: Vaultpaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petdocs
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vaultpaw/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VaultpawTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VaultpawTests
      - path: Vaultpaw.storekit
    dependencies:
      - target: Vaultpaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petdocs.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VaultpawUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VaultpawUITests
    dependencies:
      - target: Vaultpaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petdocs.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vaultpaw:
    build:
      targets:
        Vaultpaw: all
        VaultpawTests: [test]
        VaultpawUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vaultpaw.storekit
    test:
      config: Debug
      storeKitConfiguration: Vaultpaw.storekit
      targets:
        - VaultpawTests
        - VaultpawUITests
    archive:
      config: Release
